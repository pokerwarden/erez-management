name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build demo
        working-directory: client
        env:
          VITE_DEMO_MODE: true
        run: npm run build

      - name: Download latest installer into site
        run: |
          curl -L \
            "https://github.com/pokerwarden/erez-management/releases/latest/download/LawFirmSystem-Setup.exe" \
            -o client/dist/LawFirmSystem-Setup.exe \
            --fail --silent || echo "Installer not yet available, skipping"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: client/dist
