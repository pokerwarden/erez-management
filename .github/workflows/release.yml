name: Build & Release

# Trigger: push a tag like v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version.txt
        run: echo "${{ steps.version.outputs.VERSION }}" > version.txt

      - name: Build Docker image
        run: docker build -t lawfirm-system:latest .

      - name: Save Docker image as tarball
        run: docker save lawfirm-system:latest | gzip > lawfirm-system.tar.gz

      - name: Create GitHub Release with image attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "גרסה ${{ github.ref_name }}"
          body: |
            ## מה חדש בגרסה ${{ github.ref_name }}

            ### עדכון אוטומטי
            לחץ **"עדכן מערכת"** מתפריט התחל — המערכת תגבה, תוריד ותפעיל את הגרסה החדשה אוטומטית.

            ### עדכון ידני
            ```
            cd C:\LawFirmSystem
            scripts\update-app.bat
            ```

            > הנתונים שלך נשמרים בכל עדכון.
          files: lawfirm-system.tar.gz
          draft: false
          prerelease: false
