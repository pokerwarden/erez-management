name: Build & Release

# Trigger: push a tag like v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version.txt
        run: echo "${{ steps.version.outputs.VERSION }}" > version.txt

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            pokerwarden/lawfirm-system:latest
            pokerwarden/lawfirm-system:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "גרסה ${{ github.ref_name }}"
          body: |
            ## מה חדש בגרסה ${{ github.ref_name }}

            ### עדכון אוטומטי
            לחץ **"עדכן מערכת"** מתפריט התחל — המערכת תגבה, תוריד ותפעיל את הגרסה החדשה אוטומטית.

            ### עדכון ידני
            ```
            cd C:\LawFirmSystem
            docker compose pull
            docker compose up -d
            ```

            > הנתונים שלך נשמרים בכל עדכון.
          draft: false
          prerelease: false
